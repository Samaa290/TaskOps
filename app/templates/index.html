<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskOps</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2 class="logo">TaskOps</h2>

        <nav>
            <a href="#" class="active">📥 Inbox</a>
            <a href="#">📅 Today</a>
            <a href="#">🗂 Projects</a>
            <a href="#">⚙ Settings</a>
        </nav>
    </aside>

    <!-- Main -->
    <main class="main-content">

        <div class="topbar">
            <h1>Today</h1>
            <button class="add-btn" onclick="document.getElementById('modal').style.display='flex'">＋</button>
        </div>

        {% for task in tasks %}
        <div class="task-card {% if task.completed %}done{% endif %}">

            <div class="task-header">
                <h3>{{ task.title }}</h3>
            </div>

            <span class="priority {{ task.priority }}">
        {{ task.priority|capitalize }}
        </span>

        <div class="actions">
            <a href="/complete/{{ task.id }}">☐</a>
            <a href="/delete/{{ task.id }}">🗑</a>
            <button onclick="openEdit({{ task.id }}, '{{ task.title }}', '{{ task.priority }}')">✏️</button>
        </div>

        </div>
{% endfor %}

    </main>

</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h2>New Task</h2>

        <form action="/add" method="POST">
            <input type="text" name="title" placeholder="Task title" required>

            <select name="priority">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>

            <button type="submit">Save</button>
        </form>

        <button class="close" onclick="document.getElementById('modal').style.display='none'">Close</button>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h2>Edit Task</h2>

        <form id="editForm" method="POST">
            <input type="text" name="title" id="editTitle">

            <select name="priority" id="editPriority">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>

            <button type="submit">Update</button>
        </form>

        <button class="close" onclick="document.getElementById('editModal').style.display='none'">
            Close
        </button>
    </div>
</div>

<script>
function openEdit(id, title, priority) {
    document.getElementById("editModal").style.display = "flex";

    document.getElementById("editTitle").value = title;
    document.getElementById("editPriority").value = priority;

    document.getElementById("editForm").action = "/edit/" + id;
}
</script>

</body>
</html>
