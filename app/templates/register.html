<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskOps · Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { align-items: center; justify-content: center; }

        .auth-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 40px;
            width: 400px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
            animation: fadeIn 0.4s ease;
        }

        .auth-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .auth-logo::before {
            content: '';
            width: 8px; height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent);
            animation: pulse 2s infinite;
        }

        .auth-subtitle {
            color: var(--text-muted);
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 36px;
        }

        .auth-box h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-group input {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: 8px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
        }

        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .btn-primary {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 11px;
            border-radius: 8px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            margin-top: 8px;
        }

        .btn-primary:hover {
            background: #79b8ff;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(88,166,255,0.4);
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
        }

        .auth-footer a:hover { text-decoration: underline; }

        .flash-msg {
            background: var(--red-bg);
            border: 1px solid var(--red);
            color: var(--red);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="auth-box">
    <div class="auth-logo">TaskOps</div>
    <p class="auth-subtitle">Cloud Task Manager · DevOps Project</p>

    <h2>Create account</h2>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="flash-msg">⚠ {{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="/register" method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="elige un usuario" required autofocus>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
            <span class="hint">Mínimo 6 caracteres</span>
        </div>

        <button type="submit" class="btn-primary">Create account →</button>
    </form>

    <div class="auth-footer">
        ¿Ya tenés cuenta? <a href="/login">Iniciá sesión</a>
    </div>
</div>

</body>
</html>
