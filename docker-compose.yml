version: '3.8'

services:
  app:
    build: ./app
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=tu_clave_secreta_aqui
      - DATABASE_URL=postgresql://taskops_user:taskops_pass@db:5432/taskops_db
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=taskops_db
      - POSTGRES_USER=taskops_user
      - POSTGRES_PASSWORD=taskops_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
  